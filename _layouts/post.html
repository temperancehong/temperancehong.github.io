---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="page-title">{{ page.title }}</h1>
    <p class="post-date">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%B %-d, %Y" }}
      </time>
    </p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <hr>
  <p><a href="{{ '/blog/' | relative_url }}">← Back to all posts</a></p>
</article>
